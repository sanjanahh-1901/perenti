<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Perenti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=17">
  <style>
    .auth-page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-primary);
    }
    .auth-card-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 1rem;
      width: 100%;
      max-width: 440px;
      padding: 2.5rem 2rem;
      box-shadow: var(--shadow-lg);
    }
    .auth-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .auth-subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-error-banner {
      background-color: #fef2f2;
      border: 1px solid #ef4444;
      color: #991b1b;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .auth-switch-prompt {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 1.5rem;
    }
    .auth-switch-prompt a {
      color: var(--brand-primary);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-switch-prompt a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body class="auth-page-wrapper">

  <!-- Header -->
  <header class="site-header">
    <div class="header-container">
      <a href="index.html" class="brand-link">
        <span class="brand-name">perenti</span>
      </a>
      <span class="brand-tagline">Smart Events, Seamless Outcomes</span>
    </div>
  </header>

  <!-- Login Card Section -->
  <div class="auth-card-container">
    <div class="auth-card">
      <h2 class="auth-title">Log in to Perenti</h2>
      <p class="auth-subtitle">Welcome back. Enter your credentials to manage your account or book passes.</p>
      
      <!-- Error Alert -->
      <div class="auth-error-banner hidden" id="login-error-alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:1.1rem; height:1.1rem; flex-shrink:0;">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span id="login-error-text">Invalid credentials</span>
      </div>

      <!-- Success/Info Alert -->
      <div class="auth-error-banner hidden" id="login-info-alert" style="background-color: #ecfdf5; border-color: #10b981; color: #065f46;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:1.1rem; height:1.1rem; flex-shrink:0;">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span id="login-info-text"></span>
      </div>

      <form class="modal-form" id="login-form">
        <div class="form-group">
          <label for="login-email" class="form-label">Email Address</label>
          <input type="email" id="login-email" class="form-control" required placeholder="name@domain.com">
        </div>
        <div class="form-group">
          <label for="login-password" class="form-label">Password</label>
          <input type="password" id="login-password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 1rem;">
          Log In
        </button>
      </form>
      
      <div class="oauth-divider">
        <span>Or log in with Google</span>
      </div>
      
      <button type="button" class="btn btn-outline btn-block btn-lg" id="btn-google-login">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width: 1.25rem; height: 1.25rem; margin-right: 0.5rem;">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>

      <p class="auth-switch-prompt">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
    import { doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    // Auto-redirect 127.0.0.1 to localhost to avoid Firebase unauthorized domain error
    if (window.location.hostname === '127.0.0.1') {
      window.location.hostname = 'localhost';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('login-form');
      const emailInput = document.getElementById('login-email');
      const passwordInput = document.getElementById('login-password');
      const errorAlert = document.getElementById('login-error-alert');
      const errorText = document.getElementById('login-error-text');
      const infoAlert = document.getElementById('login-info-alert');
      const infoText = document.getElementById('login-info-text');

      const urlParams = new URLSearchParams(window.location.search);
      const redirectQty = urlParams.get('qty');
      const redirectUrl = urlParams.get('redirect');
      const verifyPrompt = urlParams.get('verify_prompt');

      if (verifyPrompt === '1') {
        infoText.textContent = 'Account created successfully! Please check your email to verify your account before logging in.';
        infoAlert.classList.remove('hidden');
      }

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorAlert.classList.add('hidden');
        infoAlert.classList.add('hidden');

        const email = emailInput.value.trim().toLowerCase();
        const password = passwordInput.value;

        try {
          if (email === 'admin@perenti.com') {
            // Attempt real Firebase Auth first so the user gets an Auth Token for Firestore rules
            try {
              const userCredential = await signInWithEmailAndPassword(auth, email, password);
              await handleSuccessfulLogin(userCredential.user.email);
            } catch (authError) {
              // If the user doesn't exist or wrong password, try to create it to get a valid auth token
              try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await handleSuccessfulLogin(userCredential.user.email);
              } catch (createError) {
                console.warn("Admin authentication & creation failed. Falling back to unauthenticated bypass. YOU WILL NOT BE ABLE TO CREATE EVENTS due to Firebase Security Rules.");
                await handleSuccessfulLogin(email);
              }
            }
          } else {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            
            if (!user.emailVerified) {
              errorText.innerHTML = `Please verify your email address. <a href="#" id="resend-verification" style="color: #991b1b; text-decoration: underline; font-weight: 700; margin-left: 0.5rem;">Resend Email</a>`;
              errorAlert.classList.remove('hidden');
              
              document.getElementById('resend-verification').addEventListener('click', async (ev) => {
                ev.preventDefault();
                try {
                  await sendEmailVerification(user);
                  errorText.textContent = "Verification email sent! Please check your inbox.";
                } catch (err) {
                  console.error("Error resending email:", err);
                }
              });
              
              await signOut(auth); // Sign them out from SDK to prevent unverified backend access
              return;
            }

            await handleSuccessfulLogin(user.email);
          }
        } catch (error) {
          errorText.textContent = error.message;
          errorAlert.classList.remove('hidden');
        }
      });

      // Google SSO
      const btnGoogle = document.getElementById('btn-google-login');
      btnGoogle.addEventListener('click', async () => {
        errorAlert.classList.add('hidden');
        infoAlert.classList.add('hidden');
        const provider = new GoogleAuthProvider();
        try {
          const result = await signInWithPopup(auth, provider);
          const user = result.user;
          
          if (!user.emailVerified) {
            errorText.innerHTML = `Please verify your email address. <a href="#" id="resend-verification-google" style="color: #991b1b; text-decoration: underline; font-weight: 700; margin-left: 0.5rem;">Resend Email</a>`;
            errorAlert.classList.remove('hidden');
            
            document.getElementById('resend-verification-google').addEventListener('click', async (ev) => {
              ev.preventDefault();
              try {
                await sendEmailVerification(user);
                errorText.textContent = "Verification email sent! Please check your inbox.";
              } catch (err) {
                console.error("Error resending email:", err);
              }
            });
            
            await signOut(auth);
            return;
          }

          await handleSuccessfulLogin(user.email);
        } catch (error) {
          // User closed the popup or auth error
          if (error.code !== 'auth/popup-closed-by-user') {
            console.error("Error signing in with Google:", error);
            errorText.textContent = error.message;
            errorAlert.classList.remove('hidden');
          }
        }
      });

      async function handleSuccessfulLogin(email) {
        let role = 'user';
        if (email === 'admin@perenti.com') {
          role = 'admin';
          try {
            await setDoc(doc(db, 'users', email), { email: email, role: 'admin' }, { merge: true });
          } catch (e) {
            console.error("Could not write admin to users collection:", e);
          }
        } else {
          try {
            const userDoc = await getDoc(doc(db, 'users', email));
            if (userDoc.exists()) {
              role = userDoc.data().role || 'user';
            }
          } catch(e) { console.error("Error fetching role", e); }
        }
        localStorage.setItem('currentUser', JSON.stringify({ email: email, role: role }));

        if (role === 'admin') {
          window.location.href = 'admin-dashboard.html';
        } else {
          if (redirectQty && parseInt(redirectQty) > 0) {
            await bookTicketsForUser(email, parseInt(redirectQty), 'offline');
          } else if (redirectUrl) {
            window.location.href = redirectUrl;
          } else {
            window.location.href = 'user-dashboard.html';
          }
        }
      }

      async function bookTicketsForUser(email, qty, paymentType = 'offline') {
        const orderNum = Math.floor(10000 + Math.random() * 90000);
        
        try {
          const settingsRef = doc(db, 'eventSettings', 'main');
          const settingsSnap = await getDoc(settingsRef);
          let ticketsRemaining = 60;
          if (settingsSnap.exists()) {
            ticketsRemaining = settingsSnap.data().ticketsRemaining ?? 60;
          }
          ticketsRemaining = Math.max(0, ticketsRemaining - qty);
          await updateDoc(settingsRef, { ticketsRemaining });
        } catch(e) { console.error(e); }

        const newTicketIds = [];
        for (let i = 1; i <= qty; i++) {
          const ticketIdStr = `PRNT-EBC28-${orderNum}-${i}`;
          const ticketData = {
            id: ticketIdStr,
            email: email,
            qty: 1,
            status: 'unused',
            payment: paymentType,
            approval: 'pending',
            timestamp: new Date().toLocaleString()
          };
          try {
            await setDoc(doc(db, 'tickets', ticketIdStr), ticketData);
          } catch(e) { 
            console.warn("Firestore write failed, saving ticket locally:", e);
          }

          // Always save to local storage 'tickets' array for offline fallback and local testing
          try {
            let localTickets = JSON.parse(localStorage.getItem('tickets')) || [];
            if (!localTickets.some(t => t.id === ticketIdStr)) {
              localTickets.push(ticketData);
              localStorage.setItem('tickets', JSON.stringify(localTickets));
            }
          } catch(localErr) {
            console.error("Failed to save ticket locally:", localErr);
          }
          
          newTicketIds.push(ticketIdStr);
        }

        localStorage.setItem('lastGeneratedTickets', JSON.stringify(newTicketIds));
        localStorage.setItem('justBookedQty', qty);
        localStorage.setItem('justBookedEmail', email);

        window.location.href = 'user-dashboard.html';
      }
    });
  </script>
</body>
</html>
