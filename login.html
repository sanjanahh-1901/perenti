<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Perenti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=4">
  <style>
    .auth-page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-primary);
    }
    .auth-card-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 1rem;
      width: 100%;
      max-width: 440px;
      padding: 2.5rem 2rem;
      box-shadow: var(--shadow-lg);
    }
    .auth-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .auth-subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-error-banner {
      background-color: #fef2f2;
      border: 1px solid #ef4444;
      color: #991b1b;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .auth-switch-prompt {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 1.5rem;
    }
    .auth-switch-prompt a {
      color: var(--brand-primary);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-switch-prompt a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body class="auth-page-wrapper">

  <!-- Header -->
  <header class="site-header">
    <div class="header-container">
      <a href="index.html" class="brand-link">
        <svg class="brand-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="brand-name">perenti</span>
      </a>
      <span class="brand-tagline">Smart Events, Seamless Outcomes</span>
    </div>
  </header>

  <!-- Login Card Section -->
  <div class="auth-card-container">
    <div class="auth-card">
      <h2 class="auth-title">Log in to Perenti</h2>
      <p class="auth-subtitle">Welcome back. Enter your credentials to manage your account or book passes.</p>
      
      <!-- Error Alert -->
      <div class="auth-error-banner hidden" id="login-error-alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:1.1rem; height:1.1rem; flex-shrink:0;">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span id="login-error-text">Invalid credentials</span>
      </div>

      <form class="modal-form" id="login-form">
        <div class="form-group">
          <label for="login-email" class="form-label">Email Address</label>
          <input type="email" id="login-email" class="form-control" required placeholder="name@domain.com">
        </div>
        <div class="form-group">
          <label for="login-password" class="form-label">Password</label>
          <input type="password" id="login-password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 1rem;">
          Log In
        </button>
      </form>
      
      <div class="oauth-divider">
        <span>Or log in with Microsoft</span>
      </div>
      
      <button type="button" class="btn btn-outline btn-block btn-lg" id="btn-microsoft-login">
        <svg class="microsoft-icon" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg" style="margin-right:0.5rem;">
          <path fill="#f35325" d="M0 0h11v11H0z"/>
          <path fill="#81bc06" d="M12 0h11v11H12z"/>
          <path fill="#05a6f0" d="M0 12h11v11H0z"/>
          <path fill="#ffba08" d="M12 12h11v11H12z"/>
        </svg>
        Single Sign-on (Entra ID)
      </button>

      <p class="auth-switch-prompt">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Seed default users if they don't exist
      if (!localStorage.getItem('users')) {
        const defaultUsers = [
          { email: 'nikhila@google.com', password: 'password', role: 'user' },
          { email: 'admin@perenti.com', password: 'password', role: 'admin' }
        ];
        localStorage.setItem('users', JSON.stringify(defaultUsers));
      }

      // Seed default tickets if they don't exist
      if (!localStorage.getItem('tickets')) {
        const defaultTickets = [
          { id: 'PRNT-EBC28-14205-1', email: 'rahul.k@gmail.com', qty: 1, status: 'unused', timestamp: '6/10/2026, 10:15:30 AM' },
          { id: 'PRNT-EBC28-14205-2', email: 'rahul.k@gmail.com', qty: 1, status: 'unused', timestamp: '6/10/2026, 10:15:30 AM' },
          { id: 'PRNT-EBC28-98421-1', email: 'sneha.dev@outlook.com', qty: 1, status: 'unused', timestamp: '6/10/2026, 11:22:45 AM' },
          { id: 'PRNT-EBC28-30581-1', email: 'v-priya@microsoft.com', qty: 1, status: 'checked-in', timestamp: '6/10/2026, 2:40:12 PM' }
        ];
        localStorage.setItem('tickets', JSON.stringify(defaultTickets));
      }

      const loginForm = document.getElementById('login-form');
      const emailInput = document.getElementById('login-email');
      const passwordInput = document.getElementById('login-password');
      const errorAlert = document.getElementById('login-error-alert');
      const errorText = document.getElementById('login-error-text');

      const urlParams = new URLSearchParams(window.location.search);
      const redirectQty = urlParams.get('qty');

      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        errorAlert.classList.add('hidden');

        const email = emailInput.value.trim().toLowerCase();
        const password = passwordInput.value;

        let users = [];
        try {
          users = JSON.parse(localStorage.getItem('users')) || [];
        } catch (e) {
          console.error("Error parsing users:", e);
        }
        const user = users.find(u => u.email === email && u.password === password);

        if (user) {
          // Store session
          localStorage.setItem('currentUser', JSON.stringify({ email: user.email, role: user.role }));

          // Redirect
          if (user.role === 'admin') {
            window.location.href = 'admin-dashboard.html';
          } else {
            if (redirectQty && parseInt(redirectQty) > 0) {
              bookTicketsForUser(user.email, parseInt(redirectQty), 'offline');
            } else {
              window.location.href = 'user-dashboard.html';
            }
          }
        } else {
          errorText.textContent = 'Invalid email or password.';
          errorAlert.classList.remove('hidden');
        }
      });

      // Microsoft SSO
      const btnMicrosoft = document.getElementById('btn-microsoft-login');
      btnMicrosoft.addEventListener('click', () => {
        const microsoftUser = { email: 'entra.builder@microsoft.com', role: 'user' };
        
        // Save to users list if new
        const users = JSON.parse(localStorage.getItem('users')) || [];
        if (!users.some(u => u.email === microsoftUser.email)) {
          users.push({ email: microsoftUser.email, password: 'password', role: 'user' });
          localStorage.setItem('users', JSON.stringify(users));
        }

        localStorage.setItem('currentUser', JSON.stringify(microsoftUser));

        if (redirectQty && parseInt(redirectQty) > 0) {
          bookTicketsForUser(microsoftUser.email, parseInt(redirectQty), 'offline');
        } else {
          window.location.href = 'user-dashboard.html';
        }
      });

      function bookTicketsForUser(email, qty, paymentType = 'offline') {
        const tickets = JSON.parse(localStorage.getItem('tickets')) || [];
        const orderNum = Math.floor(10000 + Math.random() * 90000);
        let ticketsRemaining = parseInt(localStorage.getItem('ticketsRemaining')) || 60;

        ticketsRemaining = Math.max(0, ticketsRemaining - qty);
        localStorage.setItem('ticketsRemaining', ticketsRemaining);

        const newTicketIds = [];
        for (let i = 1; i <= qty; i++) {
          const ticketIdStr = `PRNT-EBC28-${orderNum}-${i}`;
          tickets.push({
            id: ticketIdStr,
            email: email,
            qty: 1,
            status: 'unused',
            payment: paymentType,
            timestamp: new Date().toLocaleString()
          });
          newTicketIds.push(ticketIdStr);
        }

        localStorage.setItem('tickets', JSON.stringify(tickets));
        localStorage.setItem('lastGeneratedTickets', JSON.stringify(newTicketIds));
        localStorage.setItem('justBookedQty', qty);
        localStorage.setItem('justBookedEmail', email);

        window.location.href = 'user-dashboard.html';
      }
    });
  </script>
</body>
</html>
